name: CI_Pipeline_Basic

on:
  push:
    paths:
      - 'lab-00-ci-pipeline-basics/**'

jobs:
  preparation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Preparing stuff
        run: echo 'Preparing code...'

  tests:
    needs: preparation
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Execute tests
        run: echo 'Executing tests'

      - name: time-to-test-timeout
        run: sleep 66

  deployment:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: echo 'Deploying code'
